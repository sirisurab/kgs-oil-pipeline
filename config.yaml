acquire:
  index_path: data/external/oil_leases_2020_present.txt
  output_dir: data/raw
  min_year: 2024
  max_workers: 5
  request_timeout: 30
  monthsave_base_url: https://chasm.kgs.ku.edu/ords/oil.ogl5.MonthSave
  sleep_seconds: 0.5

ingest:
  input_dir: data/raw
  output_dir: data/interim
  output_filename: raw_combined
  dict_path: references/kgs_monthly_data_dictionary.csv

transform:
  input_dir: data/interim
  output_dir: data/interim/transformed
  dict_path: references/kgs_monthly_data_dictionary.csv

features:
  input_dir: data/interim/transformed
  output_dir: data/processed
  manifest_path: data/processed/feature_manifest.json

dask:
  scheduler: local
  n_workers: 4
  threads_per_worker: 1
  memory_limit: "3GB"
  dashboard_port: 8787

logging:
  log_file: logs/pipeline.log
  level: INFO
