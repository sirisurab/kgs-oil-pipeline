acquire:
  lease_index: data/external/oil_leases_2020_present.txt
  raw_dir: data/raw
  max_attempts: 3
  backoff_base: 1.0

ingest:
  raw_dir: data/raw
  interim_dir: data/interim
  dict_path: references/kgs_monthly_data_dictionary.csv
  min_year: 2024

transform:
  interim_dir: data/interim
  processed_dir: data/features

features:
  transform_dir: data/features
  processed_dir: data/processed

dask:
  scheduler: local
  n_workers: 2
  threads_per_worker: 2
  memory_limit: "2GB"
  dashboard_port: 8787

logging:
  log_file: logs/pipeline.log
  level: INFO
