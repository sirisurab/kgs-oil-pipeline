acquire:
  lease_index_path: "data/external/oil_leases_2020_present.txt"
  raw_dir: "data/raw"
  min_year: 2024
  max_workers: 5
  sleep_per_worker: 0.5
  retry_attempts: 3
  retry_backoff_base: 2.0
  monthsave_url_template: "https://chasm.kgs.ku.edu/ords/oil.ogl5.MonthSave?f_lc={lease_id}"
  download_timeout: 30

ingest:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  data_dictionary_path: "references/kgs_monthly_data_dictionary.csv"

transform:
  interim_dir: "data/interim"
  processed_dir: "data/processed/transform"
  unit_error_threshold: 1000000.0

features:
  processed_dir: "data/processed/transform"
  features_dir: "data/processed/features"

dask:
  scheduler: "local"
  n_workers: 4
  threads_per_worker: 2
  memory_limit: "3GB"
  dashboard_port: 8787

logging:
  log_file: "logs/pipeline.log"
  level: "INFO"
