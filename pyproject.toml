[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kgs-pipeline"
version = "0.1.0"
description = "KGS Oil & Gas Production Data Pipeline"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-mock",
    "ruff",
    "mypy",
    "pandas-stubs",
    "types-requests",
    "dask[complete]",
    "requests",
    "beautifulsoup4",
    "pyarrow",
    "lxml",
    "pandas",
    "numpy",
    "urllib3",
]

[project.scripts]
kgs-acquire   = "kgs_pipeline.acquire:main"
kgs-ingest    = "kgs_pipeline.ingest:main"
kgs-transform = "kgs_pipeline.transform:main"
kgs-features  = "kgs_pipeline.features:main"
kgs-pipeline  = "kgs_pipeline.pipeline:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["kgs_pipeline*"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disable_error_code = ["import-untyped"]
warn_return_any = false
warn_unused_ignores = false
