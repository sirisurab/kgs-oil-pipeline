[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "kgs-pipeline"
version = "0.1.0"
description = "KGS oil and gas production data pipeline"
requires-python = ">=3.11"
dependencies = [
    "dask[distributed]",
    "pandas",
    "pyarrow",
    "requests",
    "beautifulsoup4",
    "pyyaml",
    "bokeh",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-mock",
    "ruff",
    "mypy",
    "pandas-stubs",
    "types-requests",
    "types-beautifulsoup4",
]

[project.scripts]
kgs-pipeline = "kgs_pipeline.pipeline:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["kgs_pipeline*"]
