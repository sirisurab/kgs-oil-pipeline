[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kgs-pipeline"
version = "0.1.0"
description = "KGS oil and gas production data pipeline"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "requests>=2.31.0",
    "pyarrow>=12.0.0",
    "dask[dataframe]>=2024.1.0",
    "distributed>=2024.1.0",
    "bokeh>=3.0.0",
    "beautifulsoup4>=4.12.0",
    "pyyaml>=6.0",
]

[project.scripts]
kgs-pipeline = "kgs_pipeline.pipeline:main"

[tool.hatch.build.targets.wheel]
packages = ["kgs_pipeline"]
