[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "kgs_pipeline"
version = "0.1.0"
description = "KGS Oil & Gas Production Data Pipeline"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0",
    "numpy>=1.24",
    "dask[complete]>=2024.1",
    "distributed>=2024.1",
    "pyarrow>=14.0",
    "requests>=2.31",
    "beautifulsoup4>=4.12",
    "lxml>=4.9",
    "scikit-learn>=1.3",
    "pyyaml>=6.0",
    "tqdm>=4.66",
]

[project.scripts]
kgs-pipeline = "kgs_pipeline.pipeline:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["kgs_pipeline*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_return_any = false
strict = false
