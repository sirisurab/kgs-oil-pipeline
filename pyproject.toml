[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kgs_pipeline"
version = "0.1.0"
description = "KGS Kansas oil and gas production data pipeline"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0",
    "dask[dataframe]>=2023.0",
    "requests>=2.31",
    "beautifulsoup4>=4.12",
    "pyarrow>=13.0",
    "pyyaml>=6.0",
    "numpy>=1.25",
    "scikit-learn>=1.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-mock>=3.11",
    "ruff>=0.1",
    "mypy>=1.5",
    "pandas-stubs>=2.0",
    "types-requests>=2.31",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["kgs_pipeline*"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "silent"
warn_return_any = false
warn_unused_ignores = false

[tool.mypy-pandas.*]
ignore_missing_imports = true

[tool.mypy-sklearn.*]
ignore_missing_imports = true

[tool.mypy-requests.*]
ignore_missing_imports = true

[tool.mypy-dask.*]
ignore_missing_imports = true

[tool.mypy-pyarrow.*]
ignore_missing_imports = true
