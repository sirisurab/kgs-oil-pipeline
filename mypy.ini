[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True
allow_untyped_calls = True
allow_untyped_defs = True
allow_incomplete_defs = True
no_error_summary = False

[mypy-pandas]
ignore_missing_imports = True
ignore_errors = True

[mypy-pandas.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-dask]
ignore_missing_imports = True
ignore_errors = True

[mypy-dask.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-playwright]
ignore_missing_imports = True
ignore_errors = True

[mypy-playwright.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-pytest]
ignore_missing_imports = True
ignore_errors = True

[mypy-pytest.*]
ignore_missing_imports = True
ignore_errors = True
