[mypy]
python_version = 3.11
ignore_missing_imports = True
disable_error_code = import-untyped
warn_return_any = False
warn_unused_ignores = False

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-dask.*]
ignore_missing_imports = True

[mypy-pyarrow.*]
ignore_missing_imports = True
