[mypy]
python_version = 3.11
ignore_missing_imports = True
follow_imports = silent
warn_return_any = False
warn_unused_ignores = False

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-dask.*]
ignore_missing_imports = True

[mypy-pyarrow.*]
ignore_missing_imports = True
